<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#1A2744"/>
    </linearGradient>
    <linearGradient id="fact-hdr" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="dim-hdr" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#43A047"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="meas-hdr" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8E24AA"/>
      <stop offset="100%" stop-color="#6A1B9A"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow-blue">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="60" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#FFFFFF" opacity="0.06"/>
  </pattern>
  <rect width="400" height="400" rx="60" fill="url(#dots)"/>

  <!-- ── Relationship lines (behind tables) ── -->

  <!-- Fact ↔ Top-left dim -->
  <line x1="154" y1="175" x2="122" y2="141" stroke="#64B5F6" stroke-width="2" opacity="0.75"/>
  <!-- crow-foot at dim (many) -->
  <line x1="122" y1="141" x2="130" y2="134" stroke="#64B5F6" stroke-width="2" opacity="0.75"/>
  <line x1="122" y1="141" x2="115" y2="149" stroke="#64B5F6" stroke-width="2" opacity="0.75"/>
  <!-- one-tick at fact -->
  <line x1="157" y1="172" x2="151" y2="178" stroke="#64B5F6" stroke-width="2" opacity="0.9"/>
  <line x1="153" y1="168" x2="147" y2="174" stroke="#64B5F6" stroke-width="2" opacity="0.9"/>

  <!-- Fact ↔ Top-right dim -->
  <line x1="246" y1="175" x2="278" y2="141" stroke="#64B5F6" stroke-width="2" opacity="0.75"/>
  <!-- crow-foot at dim -->
  <line x1="278" y1="141" x2="270" y2="134" stroke="#64B5F6" stroke-width="2" opacity="0.75"/>
  <line x1="278" y1="141" x2="285" y2="149" stroke="#64B5F6" stroke-width="2" opacity="0.75"/>
  <!-- one-tick at fact -->
  <line x1="243" y1="172" x2="249" y2="178" stroke="#64B5F6" stroke-width="2" opacity="0.9"/>
  <line x1="247" y1="168" x2="253" y2="174" stroke="#64B5F6" stroke-width="2" opacity="0.9"/>

  <!-- Fact ↔ Bottom dim -->
  <line x1="200" y1="272" x2="200" y2="302" stroke="#64B5F6" stroke-width="2" opacity="0.75"/>
  <!-- crow-foot at bottom dim -->
  <line x1="200" y1="302" x2="193" y2="295" stroke="#64B5F6" stroke-width="2" opacity="0.75"/>
  <line x1="200" y1="302" x2="207" y2="295" stroke="#64B5F6" stroke-width="2" opacity="0.75"/>
  <!-- one-tick at fact -->
  <line x1="194" y1="274" x2="206" y2="274" stroke="#64B5F6" stroke-width="2" opacity="0.9"/>
  <line x1="194" y1="270" x2="206" y2="270" stroke="#64B5F6" stroke-width="2" opacity="0.9"/>

  <!-- ── FACT table (dead centre) ── -->
  <g filter="url(#shadow)">
    <rect x="156" y="175" width="88" height="80" rx="8" fill="#162B45"/>
    <rect x="156" y="175" width="88" height="24" rx="8" fill="url(#fact-hdr)"/>
    <rect x="156" y="187" width="88" height="12" fill="url(#fact-hdr)"/>
    <!-- header label -->
    <rect x="163" y="181" width="42" height="5" rx="2.5" fill="white" opacity="0.9"/>
    <rect x="209" y="181" width="10" height="5" rx="2.5" fill="white" opacity="0.45"/>
    <!-- key col -->
    <circle cx="163" cy="211" r="3.5" fill="#FFC107" opacity="0.9"/>
    <rect x="171" y="208" width="48" height="5" rx="2" fill="#1E3D5C"/>
    <rect x="163" y="221" width="12" height="5" rx="2" fill="#4A90D9" opacity="0.5"/>
    <rect x="178" y="221" width="38" height="5" rx="2" fill="#1E3D5C"/>
    <rect x="163" y="231" width="12" height="5" rx="2" fill="#4A90D9" opacity="0.5"/>
    <rect x="178" y="231" width="44" height="5" rx="2" fill="#1E3D5C"/>
    <rect x="163" y="241" width="12" height="5" rx="2" fill="#4A90D9" opacity="0.5"/>
    <rect x="178" y="241" width="32" height="5" rx="2" fill="#1E3D5C"/>
  </g>

  <!-- ── DIM top-left ── -->
  <g filter="url(#shadow)">
    <rect x="72" y="86" width="82" height="68" rx="8" fill="#162B1E"/>
    <rect x="72" y="86" width="82" height="22" rx="8" fill="url(#dim-hdr)"/>
    <rect x="72" y="97" width="82" height="11" fill="url(#dim-hdr)"/>
    <rect x="79" y="91" width="38" height="5" rx="2.5" fill="white" opacity="0.9"/>
    <rect x="122" y="91" width="8" height="5" rx="2.5" fill="white" opacity="0.45"/>
    <circle cx="80" cy="122" r="3.5" fill="#FFC107" opacity="0.9"/>
    <rect x="88" y="119" width="44" height="5" rx="2" fill="#1E3B26"/>
    <rect x="80" y="131" width="12" height="5" rx="2" fill="#81C784" opacity="0.5"/>
    <rect x="95" y="131" width="34" height="5" rx="2" fill="#1E3B26"/>
    <rect x="80" y="141" width="12" height="5" rx="2" fill="#81C784" opacity="0.5"/>
    <rect x="95" y="141" width="40" height="5" rx="2" fill="#1E3B26"/>
  </g>

  <!-- ── DIM top-right ── -->
  <g filter="url(#shadow)">
    <rect x="246" y="86" width="82" height="68" rx="8" fill="#162B1E"/>
    <rect x="246" y="86" width="82" height="22" rx="8" fill="url(#dim-hdr)"/>
    <rect x="246" y="97" width="82" height="11" fill="url(#dim-hdr)"/>
    <rect x="253" y="91" width="38" height="5" rx="2.5" fill="white" opacity="0.9"/>
    <rect x="296" y="91" width="8" height="5" rx="2.5" fill="white" opacity="0.45"/>
    <circle cx="254" cy="122" r="3.5" fill="#FFC107" opacity="0.9"/>
    <rect x="262" y="119" width="44" height="5" rx="2" fill="#1E3B26"/>
    <rect x="254" y="131" width="12" height="5" rx="2" fill="#81C784" opacity="0.5"/>
    <rect x="269" y="131" width="34" height="5" rx="2" fill="#1E3B26"/>
    <rect x="254" y="141" width="12" height="5" rx="2" fill="#81C784" opacity="0.5"/>
    <rect x="269" y="141" width="40" height="5" rx="2" fill="#1E3B26"/>
  </g>

  <!-- ── Measure table bottom-centre ── -->
  <g filter="url(#shadow)">
    <rect x="152" y="308" width="96" height="62" rx="8" fill="#221438"/>
    <rect x="152" y="308" width="96" height="22" rx="8" fill="url(#meas-hdr)"/>
    <rect x="152" y="319" width="96" height="11" fill="url(#meas-hdr)"/>
    <rect x="159" y="313" width="42" height="5" rx="2.5" fill="white" opacity="0.9"/>
    <rect x="205" y="313" width="8" height="5" rx="2.5" fill="white" opacity="0.45"/>
    <text x="162" y="346" font-family="Georgia,serif" font-size="15" fill="#CE93D8" opacity="0.9">∑</text>
    <rect x="177" y="340" width="48" height="6" rx="3" fill="#3B1F52"/>
    <text x="162" y="361" font-family="Georgia,serif" font-size="15" fill="#CE93D8" opacity="0.6">∑</text>
    <rect x="177" y="355" width="36" height="6" rx="3" fill="#3B1F52"/>
  </g>
</svg>
